service: youtube-api
frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1

functions:
  youtubeHelloFn:
    handler: hello.handler
    events:
      - httpApi:
          path: /hello
          method: GET

  youtubebyeFn:
    handler: bye.handler
    events:
      - httpApi:
          path: /bye
          method: GET